name: Codex Task Runner

on:
  workflow_dispatch:
    inputs:
      jira_key:
        description: "Jira issue key"
        required: true
      task_description:
        description: "Task description"
        required: true

jobs:
  codex:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    steps:
      - name: Checkout repo
        uses: actions/checkout@v5

      - name: Check OpenAI API key
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          if [ -z "$OPENAI_API_KEY" ]; then
            echo "OPENAI_API_KEY is missing or empty"
            exit 1
          fi
          echo "OPENAI_API_KEY is present"

      - name: Run Codex
        id: run_codex
        uses: openai/codex-action@v1
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          prompt: |
            Add one short line to README.md mentioning this repo is being tested with Codex.
            Keep the change minimal and summarize what changed.
          output-file: codex-output.md
          sandbox: workspace-write
          safety-strategy: drop-sudo
          codex-args: '["--full-auto"]'

      - name: Show Codex output
        if: always()
        run: |
          if [ -f codex-output.md ]; then
            cat codex-output.md
          else
            echo "codex-output.md not found"
          fi

      - name: Show git diff
        if: always()
        run: |
          git status
          git diff --stat
          git diff
