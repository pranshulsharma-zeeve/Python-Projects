name: Codex Task Runner

on:
  workflow_dispatch:
    inputs:
      jira_key:
        description: "Jira issue key"
        required: true
      task_description:
        description: "Task description"
        required: true

jobs:
  codex:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Codex CLI
        run: npm install -g @openai/codex

      - name: Run Codex
        run: |
          codex run "
          Task: ${{ github.event.inputs.task_description }}

          Requirements:
          - Implement the feature or fix
          - Add/update unit tests
          - Ensure tests pass
          - Follow project structure
          "

      - name: Create Branch
        run: |
          BRANCH=feature/${{ github.event.inputs.jira_key }}
          git checkout -b $BRANCH
          git add .
          git commit -m "Codex: ${{ github.event.inputs.jira_key }}"
          git push origin $BRANCH

      - name: Create PR
        uses: peter-evans/create-pull-request@v6
        with:
          branch: feature/${{ github.event.inputs.jira_key }}
          title: "Codex: ${{ github.event.inputs.jira_key }}"
          body: "Auto-generated by Codex"
