name: Codex Task Runner

on:
  workflow_dispatch:
    inputs:
      jira_key:
        description: "Jira issue key"
        required: true
      task_description:
        description: "Task description"
        required: true

jobs:
  codex:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v5

      - name: Run Codex
        id: run_codex
        uses: openai/codex-action@v1
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          prompt: |
            Task: ${{ github.event.inputs.task_description }}

            Jira key: ${{ github.event.inputs.jira_key }}

            Requirements:
            - Implement the requested change
            - Add or update unit tests
            - Keep changes minimal
            - Follow the existing project structure
            - Summarize what changed
          sandbox: workspace-write
          safety-strategy: drop-sudo

      - name: Create branch and commit changes
        run: |
          BRANCH="feature/${{ github.event.inputs.jira_key }}"
          git checkout -b "$BRANCH"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "Codex: ${{ github.event.inputs.jira_key }}"
          git push origin "$BRANCH"

      - name: Create PR
        if: success()
        uses: peter-evans/create-pull-request@v7
        with:
          branch: feature/${{ github.event.inputs.jira_key }}
          title: "Codex: ${{ github.event.inputs.jira_key }}"
          body: |
            Auto-generated by Codex for Jira issue ${{ github.event.inputs.jira_key }}.
