name: Codex Task Runner

on:
  workflow_dispatch:
    inputs:
      jira_key:
        description: "Jira issue key"
        required: true
      task_description:
        description: "Task description"
        required: true

jobs:
  codex:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    steps:
      - name: Checkout repo
        uses: actions/checkout@v5

      - name: Show working tree before Codex
        run: |
          pwd
          ls -la
          git status

      - name: Run Codex
        id: run_codex
        uses: openai/codex-action@v1
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          prompt: |
            You are working in an existing GitHub repository.

            Jira key: ${{ github.event.inputs.jira_key }}
            Task: ${{ github.event.inputs.task_description }}

            Make a very small safe change in this repository.
            Prefer changing one file only.
            Add or update a minimal test only if the repo already has tests.
            At the end, summarize exactly what you changed.

          output-file: codex-output.md
          sandbox: workspace-write
          safety-strategy: drop-sudo
          codex-args: '["--full-auto"]'

      - name: Show Codex output file
        if: always()
        run: |
          echo "=== codex-output.md ==="
          if [ -f codex-output.md ]; then
            cat codex-output.md
          else
            echo "codex-output.md not found"
          fi

      - name: Show git diff after Codex
        if: always()
        run: |
          git status
          git diff --stat
          git diff

      - name: Create branch and commit changes
        run: |
          BRANCH="feature/${{ github.event.inputs.jira_key }}"
          git checkout -b "$BRANCH"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "Codex: ${{ github.event.inputs.jira_key }}"
          git push origin "$BRANCH"

      - name: Create PR
        if: success()
        uses: peter-evans/create-pull-request@v7
        with:
          branch: feature/${{ github.event.inputs.jira_key }}
          title: "Codex: ${{ github.event.inputs.jira_key }}"
          body: |
            Auto-generated by Codex for Jira issue ${{ github.event.inputs.jira_key }}.
